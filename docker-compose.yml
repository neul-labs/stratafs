version: '3.8'

services:
  stratafs:
    build:
      context: .
      dockerfile: Dockerfile
    image: stratafs:latest
    container_name: stratafs
    restart: unless-stopped
    ports:
      - "8080:8080"  # REST API
      - "8081:8081"  # MCP Server
    volumes:
      - stratafs_data:/app/data
      - stratafs_config:/app/.stratafs
      - ./docker/config.json:/app/config.json:ro
      # Mount additional directories for indexing
      - ./docs:/app/data/docs:ro
      - ./examples:/app/data/examples:ro
    environment:
      - STRATAFS_GLOBAL_DIR=/app/.stratafs
      - STRATAFS_API_PORT=8080
      - STRATAFS_MCP_PORT=8081
      - STRATAFS_WORKER_COUNT=4
      - STRATAFS_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stratafs-api.rule=Host(`stratafs.local`)"
      - "traefik.http.routers.stratafs-api.service=stratafs-api"
      - "traefik.http.services.stratafs-api.loadbalancer.server.port=8080"
      - "traefik.http.routers.stratafs-mcp.rule=Host(`stratafs-mcp.local`)"
      - "traefik.http.routers.stratafs-mcp.service=stratafs-mcp"
      - "traefik.http.services.stratafs-mcp.loadbalancer.server.port=8081"

  # Optional: Reverse proxy for production
  traefik:
    image: traefik:v2.10
    container_name: stratafs-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@yourdomain.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8090:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    profiles:
      - production
    restart: unless-stopped

  # Optional: Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: stratafs-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    profiles:
      - monitoring
    restart: unless-stopped

  # Optional: Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: stratafs-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    profiles:
      - monitoring
    restart: unless-stopped

volumes:
  stratafs_data:
    driver: local
  stratafs_config:
    driver: local
  traefik_letsencrypt:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: stratafs_network