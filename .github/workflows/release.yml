name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-desktop-linux:
    name: Build Desktop UI (Linux)
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install Wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

    - name: Install Linux dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev pkg-config

    - name: Build stratafs-ui
      working-directory: desktop/stratafs-ui
      run: wails build -platform linux/amd64

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: stratafs-ui-linux-amd64
        path: desktop/stratafs-ui/build/bin/stratafs-ui

  build-linux-windows:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Install cross-compilation dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
        if [ "${{ matrix.os }}" = "windows" ]; then
          sudo apt-get install -y gcc-mingw-w64
          # Download WinFSP headers required by cgofuse for Windows FUSE support
          WINPSP_DIR="/usr/local/include/winfsp"
          sudo mkdir -p "$WINPSP_DIR"
          for f in winfsp_fuse.h fuse_common.h fuse.h fuse_opt.h; do
            sudo curl -fsSL "https://raw.githubusercontent.com/winfsp/winfsp/v2.1/inc/fuse/${f}" -o "$WINPSP_DIR/${f}"
          done
          echo "WINPSP_CFLAGS=-I$WINPSP_DIR" >> $GITHUB_ENV
          # Download SQLite amalgamation headers for sqlite-vec cross-compilation
          SQLITE_DIR="/usr/local/include/sqlite"
          sudo mkdir -p "$SQLITE_DIR"
          sudo curl -fsSL "https://www.sqlite.org/2024/sqlite-amalgamation-3450000.zip" -o /tmp/sqlite.zip
          sudo unzip -q -j /tmp/sqlite.zip "sqlite-amalgamation-3450000/sqlite3.h" "sqlite-amalgamation-3450000/sqlite3ext.h" -d "$SQLITE_DIR"
          echo "WINPSP_CFLAGS=-I$WINPSP_DIR -I$SQLITE_DIR" >> $GITHUB_ENV
        fi

    - name: Download ONNX Runtime
      run: |
        ONNX_VERSION="1.16.3"
        OS_NAME="${{ matrix.os }}"
        ARCH_NAME="${{ matrix.arch }}"

        case "$OS_NAME" in
          linux) ONNX_OS="linux" ;;
          windows) ONNX_OS="win" ;;
        esac

        case "$ARCH_NAME" in
          amd64) ONNX_ARCH="x64" ;;
          arm64) ONNX_ARCH="aarch64" ;;
        esac

        ONNX_NAME="onnxruntime-${ONNX_OS}-${ONNX_ARCH}-${ONNX_VERSION}"
        ONNX_DIR="onnx/${OS_NAME}-${ARCH_NAME}"

        mkdir -p "$ONNX_DIR"

        if [ "$OS_NAME" = "windows" ]; then
          ONNX_URL="https://github.com/microsoft/onnxruntime/releases/download/v${ONNX_VERSION}/${ONNX_NAME}.zip"
          curl -fsSL "$ONNX_URL" -o "${ONNX_DIR}/onnx.zip"
          cd "$ONNX_DIR" && unzip -q onnx.zip && mv ${ONNX_NAME}/* . && rm -rf ${ONNX_NAME} onnx.zip
        else
          ONNX_URL="https://github.com/microsoft/onnxruntime/releases/download/v${ONNX_VERSION}/${ONNX_NAME}.tgz"
          curl -fsSL "$ONNX_URL" | tar -xz -C "$ONNX_DIR" --strip-components=1
        fi

    - name: Set up cross-compilation
      run: |
        case "${{ matrix.os }}-${{ matrix.arch }}" in
          linux-arm64)
            echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CXX=aarch64-linux-gnu-g++" >> $GITHUB_ENV
            ;;
          windows-amd64)
            echo "CC=x86_64-w64-mingw32-gcc" >> $GITHUB_ENV
            echo "CXX=x86_64-w64-mingw32-g++" >> $GITHUB_ENV
            ;;
        esac

    - name: Build binary
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
        CGO_ENABLED: 1
        VERSION: ${{ github.ref_name }}
      run: |
        ONNX_DIR="onnx/${{ matrix.os }}-${{ matrix.arch }}"
        BINARY_NAME="stratafs"
        if [ "${{ matrix.os }}" = "windows" ]; then
          BINARY_NAME="stratafs.exe"
        fi

        BUILD_DIR="build/${{ matrix.os }}-${{ matrix.arch }}"
        mkdir -p "$BUILD_DIR"

        CGO_CFLAGS=""
        # Skip ONNX Runtime for Windows cross-compilation:
        # Windows .lib files are not compatible with mingw-w64 linker.
        if [ "${{ matrix.os }}" != "windows" ] && [ -d "$ONNX_DIR" ]; then
          CGO_CFLAGS="-I$PWD/$ONNX_DIR/include"
          export CGO_LDFLAGS="-L$PWD/$ONNX_DIR/lib -lonnxruntime"
        fi
        if [ -n "$WINPSP_CFLAGS" ]; then
          CGO_CFLAGS="$CGO_CFLAGS $WINPSP_CFLAGS"
        fi
        export CGO_CFLAGS

        go build \
          -tags "fts5" \
          -ldflags "-s -w -X main.version=${VERSION} -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          -o "$BUILD_DIR/$BINARY_NAME" \
          ./cmd/stratafs

        if [ "${{ matrix.os }}" != "windows" ] && [ -d "$ONNX_DIR/lib" ]; then
          cp -r "$ONNX_DIR/lib" "$BUILD_DIR/" || true
        fi

        cat > "$BUILD_DIR/README.txt" << EOF
        StrataFS ${VERSION}
        ================

        Platform: ${{ matrix.os }}/${{ matrix.arch }}
        Build Time: $(date -u)

        Installation:
        1. Extract this archive
        2. Copy stratafs to a directory in your PATH
        3. Run 'stratafs config init' to initialize

        For more information: https://github.com/${{ github.repository }}
        EOF

    - name: Create archive
      run: |
        BUILD_DIR="build/${{ matrix.os }}-${{ matrix.arch }}"
        ARCHIVE_NAME="stratafs-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}"

        if [ "${{ matrix.os }}" = "windows" ]; then
          cd build && zip -r "${ARCHIVE_NAME}.zip" "${{ matrix.os }}-${{ matrix.arch }}"
        else
          cd build && tar -czf "${ARCHIVE_NAME}.tar.gz" "${{ matrix.os }}-${{ matrix.arch }}"
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: stratafs-${{ matrix.os }}-${{ matrix.arch }}
        path: build/stratafs-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.*

  build-darwin-arm64:
    name: Build darwin-arm64
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Download ONNX Runtime
      run: |
        set -e
        ONNX_VERSION="1.16.3"
        ONNX_NAME="onnxruntime-osx-arm64-${ONNX_VERSION}"
        ONNX_DIR="onnx/darwin-arm64"
        mkdir -p "$ONNX_DIR"
        curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ONNX_VERSION}/${ONNX_NAME}.tgz" -o /tmp/onnx.tgz
        tar -xzf /tmp/onnx.tgz -C "$ONNX_DIR"
        rm -f /tmp/onnx.tgz
        mv "$ONNX_DIR/$ONNX_NAME"/* "$ONNX_DIR"/
        rmdir "$ONNX_DIR/$ONNX_NAME"
        echo "ONNX Runtime contents:"
        ls -la "$ONNX_DIR"
        ls -la "$ONNX_DIR/lib"

    - name: Build binary
      env:
        CGO_ENABLED: 1
        VERSION: ${{ github.ref_name }}
      run: |
        ONNX_DIR="onnx/darwin-arm64"
        export CGO_CFLAGS="-I$PWD/$ONNX_DIR/include"
        export CGO_LDFLAGS="-L$PWD/$ONNX_DIR/lib -lonnxruntime"

        BUILD_DIR="build/darwin-arm64"
        mkdir -p "$BUILD_DIR"

        go build \
          -tags "fts5" \
          -ldflags "-s -w -X main.version=${VERSION} -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          -o "$BUILD_DIR/stratafs" \
          ./cmd/stratafs

        cp -r "$ONNX_DIR/lib" "$BUILD_DIR/" || true

        cat > "$BUILD_DIR/README.txt" << EOF
        StrataFS ${VERSION}
        ================

        Platform: darwin/arm64
        Build Time: $(date -u)

        Installation:
        1. Extract this archive
        2. Copy stratafs to a directory in your PATH
        3. Run 'stratafs config init' to initialize

        For more information: https://github.com/${{ github.repository }}
        EOF

    - name: Create archive
      run: |
        BUILD_DIR="build/darwin-arm64"
        ARCHIVE_NAME="stratafs-${{ github.ref_name }}-darwin-arm64"
        cd build && tar -czf "${ARCHIVE_NAME}.tar.gz" "darwin-arm64"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: stratafs-darwin-arm64
        path: build/stratafs-${{ github.ref_name }}-darwin-arm64.*

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=tag
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux-windows, build-darwin-arm64, build-desktop-linux, build-docker]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare release assets
      run: |
        mkdir -p release
        find artifacts -name "*.tar.gz" -o -name "*.zip" | xargs -I {} cp {} release/

        # Generate checksums
        cd release
        sha256sum * > checksums.txt

    - name: Generate release notes
      id: release_notes
      run: |
        VERSION=${{ github.ref_name }}

        # Get the previous tag
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

        echo "# StrataFS $VERSION" > release_notes.md
        echo "" >> release_notes.md

        if [ -n "$PREV_TAG" ]; then
          echo "## Changes since $PREV_TAG" >> release_notes.md
          echo "" >> release_notes.md
          git log --oneline --no-decorate $PREV_TAG..HEAD >> release_notes.md
        fi

        echo "" >> release_notes.md
        echo "## Installation" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Quick Install (Linux/macOS)" >> release_notes.md
        echo '```bash' >> release_notes.md
        echo 'curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash' >> release_notes.md
        echo '```' >> release_notes.md
        echo "" >> release_notes.md
        echo "### Windows (PowerShell)" >> release_notes.md
        echo '```powershell' >> release_notes.md
        echo 'Invoke-WebRequest -Uri "https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.ps1" -OutFile "install.ps1"; .\install.ps1' >> release_notes.md
        echo '```' >> release_notes.md
        echo "" >> release_notes.md
        echo "### Docker" >> release_notes.md
        echo '```bash' >> release_notes.md
        echo 'docker run -p 8080:8080 -p 8081:8081 -v ./data:/app/data ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION' >> release_notes.md
        echo '```' >> release_notes.md
        echo "" >> release_notes.md
        echo "### Manual Installation" >> release_notes.md
        echo "Download the appropriate binary for your platform from the assets below." >> release_notes.md

    - name: Create GitHub Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "release/*"
        bodyFile: "release_notes.md"
        draft: false
        prerelease: ${{ contains(github.ref_name, '-') }}
        token: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: create-release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install build tools
      run: pip install build

    - name: Build Python package
      run: python -m build packages/python/stratafs

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: packages/python/stratafs/dist

  publish-npm:
    name: Publish to npm
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: cd packages/npm/stratafs && npm ci

    - name: Publish to npm
      run: cd packages/npm/stratafs && npm publish --provenance --access public